<!DOCTYPE html>
<html>
<head>
<title>Test Tool</title>
</head>

<body style="text-align:center;font-family:Arial;padding:30px;background:#111;color:white;">

<h1>🚀 Test Creator Tool</h1>

<input id="topic" placeholder="Enter topic" style="padding:10px;width:200px;">

<br><br>

<button onclick="generateTitle()">Title Generate</button>

<h2 id="result"></h2>

<script>

function generateTitle(){

let topic = document.getElementById("topic").value;

if(!topic){
document.getElementById("result").innerText = "❌ Topic daalo pehle";
return;
}

document.getElementById("result").innerText =
"🔥 Top 10 Secrets About " + topic;

}

</script>

</body>
</html>
