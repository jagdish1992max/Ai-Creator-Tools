<!DOCTYPE html>
<html>
<head>
<title>Creator Tools</title>
</head>

<body style="text-align:center;font-family:Arial;background:#111;color:white;padding:30px;">

<h1>🚀 Creator Tools</h1>

<input id="topic" placeholder="Enter topic" style="padding:10px;width:200px;">

<br><br>

<button onclick="title()">Title Generate</button>

<div id="result" style="margin-top:20px;font-size:20px;"></div>

<script>

function title(){

let topic = document.getElementById("topic").value

if(topic==""){
document.getElementById("result").innerText="Pehle topic daalo 😎"
return
}

document.getElementById("result").innerText =
"🔥 Top 10 Secrets About " + topic

}

</script>

</body>
</html>function copyText(){
let text=document.getElementById("result").innerText
navigator.clipboard.writeText(text)
alert("Copied!")
}

</script>

</body>
